services:
  wyoming-indextts:
    build: .
    container_name: wyoming-indextts
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "10300:10300"
    volumes:
      # Drop your voice .wav files in ./voices/ — each becomes a selectable voice
      - ./voices:/app/voices
      # Persist model checkpoints across rebuilds
      - indextts-checkpoints:/app/checkpoints
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Directory containing reference voice WAV files
      - VOICES_DIR=/app/voices
      # Default voice (filename without .wav). Leave empty to use first found.
      - DEFAULT_VOICE=
      # Model version: v1, v1.5, or v2
      - MODEL_VERSION=v2
      # Use FP16 for lower VRAM usage
      - FP16=true
      # Generation quality parameters
      - TOP_P=0.8
      - TOP_K=30
      - TEMPERATURE=0.8
      - NUM_BEAMS=3
      - REPETITION_PENALTY=10.0
      - MAX_MEL_TOKENS=1500
      # Set to true for verbose logging
      - DEBUG=false

volumes:
  indextts-checkpoints:
